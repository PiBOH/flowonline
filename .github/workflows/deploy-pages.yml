# =====================================================================
#  FlowOnline · Deploy su GitHub Pages
# ---------------------------------------------------------------------
#  Pubblica DUE cose in un'unica Pages site:
#    1. il repository così com'è         -> https://piboh.github.io/flowonline
#    2. la landing (cartella landing-github-pages) -> .../flowonline/land
#
#  >>> AZIONE ONE-TIME OBBLIGATORIA <<<
#  Le GitHub Pages "Deploy from a branch" e i workflow non possono
#  coesistere. In Impostazioni > Pages > "Build and deployment":
#     Source:  GitHub Actions   (NON "Deploy from a branch")
#  In questo modo il workflow assume il controllo dell'intero deploy.
# =====================================================================

name: deploy-pages.yml

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Un solo deploy alla volta; quello nuovo annulla quello in corso.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Installa le dipendenze della landing
        working-directory: landing-github-pages
        run: npm install

      - name: Build della landing (single-file index.html)
        working-directory: landing-github-pages
        run: npm run build

      - name: Assembla l'artifact di Pages
        run: |
          set -e
          # Cartella che verrà pubblicata
          mkdir -p publish/land

          # (1) Copia il sito attuale così com'è (root del repo)
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='landing-github-pages' \
            --exclude='node_modules' \
            --exclude='dist' \
            --exclude='publish' \
            --exclude='.gitignore' \
            --exclude='.DS_Store' \
            ./ publish/

          # (2) Aggiungi la landing in /land
          cp landing-github-pages/dist/index.html publish/land/index.html

          # Evita l'elaborazione Jekyll (mantiene file/cartelle "strane")
          touch publish/.nojekyll

          echo "Struttura finale pubblicata:"
          find publish -maxdepth 2 -mindepth 1 | sort

      - name: Configura GitHub Pages
        uses: actions/configure-pages@v5

      - name: Carica l'artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: publish

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy su GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
